# /etc/traefik/traefik.yml
accessLog:
  addInternals: true
  bufferingSize: 50
  filePath: "/etc/traefik/logs/access.log"
  fields:
    defaultMode: keep
    headers:
      defaultMode: keep
      names:
        X-Homelab-Access-Bypass: keep
        CF-Connection-IP: keep
        X-Forwarded-For: keep
  format: json


api:
  dashboard: true
  disabledashboardad: true
  insecure: true
  # Kept enabled here so the dashboard/API stays reachable on the internal-only setup used by this example.


certificatesResolvers:
  cloudflare:
    acme:
      email: "admin@example.com"
      storage: "/etc/traefik/acme.json"
      dnsChallenge:
        provider: "cloudflare"
        propagation:
          delayBeforeChecks: 10s


entryPoints:
  web-external:
    address: ":81"
    http:
      redirections:
        entryPoint:
          to: websecure-external
          scheme: https
          permanent: true

  websecure-external:
    address: ":444"
    asDefault: true
    forwardedHeaders:
      trustedIPs:
        # BEGIN CLOUDFLARE IPs (managed by script)
        # The update script for this list will be published in https://github.com/smoochy/homelab-automation-scripts
        # Cloudflare IPv4
        - "173.245.48.0/20"
        - "103.21.244.0/22"
        - "103.22.200.0/22"
        - "103.31.4.0/22"
        - "141.101.64.0/18"
        - "108.162.192.0/18"
        - "190.93.240.0/20"
        - "188.114.96.0/20"
        - "197.234.240.0/22"
        - "198.41.128.0/17"
        - "162.158.0.0/15"
        - "104.16.0.0/13"
        - "104.24.0.0/14"
        - "172.64.0.0/13"
        # Cloudflare IPv6
        - "2400:cb00::/32"
        - "2606:4700::/32"
        - "2803:f800::/32"
        - "2405:b500::/32"
        - "2405:8100::/32"
        - "2a06:98c0::/29"
        # END CLOUDFLARE IPs (managed by script)
        # Until then, keep this list updated manually or replace it with your own automation.
    http:
      encodedCharacters:
        allowEncodedSlash: false
        allowEncodedBackSlash: false
        allowEncodedNullCharacter: false
        allowEncodedSemicolon: false
        allowEncodedPercent: false
        allowEncodedQuestionMark: false
        allowEncodedHash: false
      tls:
        certResolver: cloudflare
        domains:
          - main: "example.com"
            sans:
              - "*.example.com"


  web-internal:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure-internal
          scheme: https
          permanent: true

  websecure-internal:
    address: ":443"
    asDefault: true
    forwardedHeaders:
      trustedIPs:
        - "192.0.2.0/24"
        - "172.0.0.0/8"
    http:
      encodedCharacters:
        allowEncodedSlash: false
        allowEncodedBackSlash: false
        allowEncodedNullCharacter: false
        allowEncodedSemicolon: false
        allowEncodedPercent: false
        allowEncodedQuestionMark: false
        allowEncodedHash: false
      tls:
        certResolver: cloudflare
        domains:
          - main: "example.com"
            sans:
              - "*.example.com"



experimental:
  plugins:
    bouncer:
      moduleName: github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin
      version: v1.5.1
    traefikwarp:
      moduleName: github.com/l4rm4nd/traefik-warp
      version: v1.1.5   # Or latest version from Plugin-Store


global:
  checkNewVersion: true
  sendAnonymousUsage: false


log:
  compress: true
  level: "INFO"
  # Not used, so Dozzle can pick up the logs from the container's stdout
  #filePath: "/etc/traefik/logs/traefik.log"
  #maxAge: 14
  #maxBackups: 10
  #maxSize: 100


providers:
  docker:
    # Traefik shall communicate with the Docker daemon via the TCP socket exposed by the docker-proxy container (Deployed by Komodo on Host)
    endpoint: "tcp://dockerproxy:2375"
    exposedByDefault: false
    network: "smoonet"
  file:
    directory: "/etc/traefik/rules"
    watch: true
  http:
    endpoint: "http://traefik-middleware-manager:3456/api/v1/traefik-config"
    pollInterval: 5s
