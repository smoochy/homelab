services:
  crowdsec:
    container_name: crowdsec
    environment:
      - BOUNCER_KEY_TRAEFIK=${CROWDSEC_TRAEFIK_BOUNCER_API_KEY}
      - COLLECTIONS=crowdsecurity/traefik crowdsecurity/http-cve crowdsecurity/whitelist-good-actors
      - GID=98
      - HOST_CONTAINERNAME=crowdsec
      - HOST_HOSTNAME=homelab-host
      - HOST_OS=Unraid
      - PGID=100
      - PUID=99
      - TZ=Europe/Berlin
      - UID=99
    image: ghcr.io/crowdsecurity/crowdsec:v1.7.7@sha256:6ca53ad26196ca59ddd4fa692a586b73d8fcde085046163b9ca2f04887dca563
    labels:
      - com.smoochy.komodo.restore_stack=crowdsec
      - net.unraid.docker.icon=https://raw.githubusercontent.com/ibracorp/app-logos/main/crowdsec/crowdsec.png
    networks:
      - smoonet
    pids_limit: 2048
    ports:
      - "6060:6060/tcp"
      - "6061:8080/tcp"
    restart: unless-stopped
    volumes:
      - /mnt/user/appdata/crowdsec/:/etc/crowdsec:rw
      - /mnt/user/appdata/crowdsec/data/:/var/lib/crowdsec/data:rw
      - /mnt/user/appdata/crowdsec:/var/log/crowdsec:rw
      - /mnt/user/appdata/traefik/logs/:/var/log/traefik:rw
      - /var/log/syslog:/syslog:ro
  crowdsec-dashboard:
    container_name: crowdsec-dashboard
    depends_on:
      - crowdsec
    environment:
      - HOST_CONTAINERNAME=${SERVICE}
      - HOST_HOSTNAME=homelab-host
      - HOST_OS=Unraid
      - MB_DB_FILE=/data/metabase.db
      - MGID=98
      - MUID=99
      - TZ=Europe/Berlin
    image: metabase/metabase:v0.59.5.1@sha256:7075d01d471477a435ac12334a5ece82240782d616056e77bfb9fc9824a814bc
    networks:
      - smoonet
    pids_limit: 2048
    ports:
      - "3000:3000/tcp"
    restart: unless-stopped
    volumes:
      - /mnt/user/appdata/crowdsec/dashboard/:/data/:rw
      - /mnt/user/appdata/crowdsec/data/:/metabase-data/:rw
    ## Start Traefik Config
    labels:
      - traefik.enable=true
      # # Internal
      - traefik.http.routers.${SERVICE}-internal.entrypoints=websecure-internal
      - traefik.http.routers.${SERVICE}-internal.middlewares=chain-internal@file
      - traefik.http.routers.${SERVICE}-internal.priority=5000
      - traefik.http.routers.${SERVICE}-internal.rule=Host(`${TRAEFIK_EXTERNAL_URL}`)
      - traefik.http.routers.${SERVICE}-internal.service=${SERVICE}
      - traefik.http.routers.${SERVICE}-internal.tls=true
      # # External
      - traefik.http.routers.${SERVICE}-external.entrypoints=websecure-external
      - traefik.http.routers.${SERVICE}-external.middlewares=chain-external@file
      - traefik.http.routers.${SERVICE}-external.priority=10
      - traefik.http.routers.${SERVICE}-external.rule=Host(`${TRAEFIK_EXTERNAL_URL}`)
      - traefik.http.routers.${SERVICE}-external.service=${SERVICE}
      - traefik.http.routers.${SERVICE}-external.tls=true
      # # HTTP-Header
      - traefik.http.routers.${SERVICE}-bypass.entrypoints=websecure-external
      - traefik.http.routers.${SERVICE}-bypass.middlewares=chain-external-bypass@file
      - traefik.http.routers.${SERVICE}-bypass.priority=2500
      - traefik.http.routers.${SERVICE}-bypass.rule=Host(`${TRAEFIK_EXTERNAL_URL}`) && Header(`${SPECIAL_HEADER_NAME}`, `${SPECIAL_HEADER_SECRET}`)
      - traefik.http.routers.${SERVICE}-bypass.service=${SERVICE}
      - traefik.http.routers.${SERVICE}-bypass.tls=true
      # Service port (must match the port Komodo listens on INSIDE the container)
      - traefik.docker.network=smoonet
      - traefik.http.services.${SERVICE}.loadbalancer.server.url=${TRAEFIK_INTERNAL_URL}
      ## End Traefik Config
      - com.smoochy.komodo.restore_stack=crowdsec
      - net.unraid.docker.icon=https://raw.githubusercontent.com/ibracorp/app-logos/main/crowdsec/crowdsec.png
      - net.unraid.docker.webui=http://192.0.2.99:3000
  crowdsec-manager:
    container_name: crowdsec-manager
    depends_on:
      - crowdsec
    environment:
      - CROWDSEC_METRICS_URL=http://crowdsec:6060/metrics
      - DOCKER_HOST=tcp://dockerproxy:2375
      - ENVIRONMENT=production
      - HOST_CONTAINERNAME=${CROWDSEC_MANAGER_SERVICE}
      - HOST_HOSTNAME=homelab-host
      - HOST_OS=Unraid
      - PORT=8080
      - TRAEFIK_CONTAINER_NAME=traefik
      - TRAEFIK_DYNAMIC_CONFIG=/etc/traefik/dynamic.yml
      - TRAEFIK_STATIC_CONFIG=/etc/traefik/traefik.yml
      - TZ=Europe/Berlin
    image: ghcr.io/hhftechnology/crowdsec_manager:2.3.0@sha256:f0bf971db61f0ec0f4242e572a8efe5b0747634efa25d4abc5a671981b3d0bbb
    labels:
      - traefik.enable=true
      # # Internal
      - traefik.http.routers.${CROWDSEC_MANAGER_SERVICE}-internal.entrypoints=websecure-internal
      - traefik.http.routers.${CROWDSEC_MANAGER_SERVICE}-internal.middlewares=chain-internal@file
      - traefik.http.routers.${CROWDSEC_MANAGER_SERVICE}-internal.priority=5000
      - traefik.http.routers.${CROWDSEC_MANAGER_SERVICE}-internal.rule=Host(`${CROWDSEC_MANAGER_EXTERNAL_URL}`)
      - traefik.http.routers.${CROWDSEC_MANAGER_SERVICE}-internal.service=${CROWDSEC_MANAGER_SERVICE}
      - traefik.http.routers.${CROWDSEC_MANAGER_SERVICE}-internal.tls=true
      # # External
      - traefik.http.routers.${CROWDSEC_MANAGER_SERVICE}-external.entrypoints=websecure-external
      - traefik.http.routers.${CROWDSEC_MANAGER_SERVICE}-external.middlewares=chain-external@file
      - traefik.http.routers.${CROWDSEC_MANAGER_SERVICE}-external.priority=10
      - traefik.http.routers.${CROWDSEC_MANAGER_SERVICE}-external.rule=Host(`${CROWDSEC_MANAGER_EXTERNAL_URL}`)
      - traefik.http.routers.${CROWDSEC_MANAGER_SERVICE}-external.service=${CROWDSEC_MANAGER_SERVICE}
      - traefik.http.routers.${CROWDSEC_MANAGER_SERVICE}-external.tls=true
      # # HTTP-Header
      - traefik.http.routers.${CROWDSEC_MANAGER_SERVICE}-bypass.entrypoints=websecure-external
      - traefik.http.routers.${CROWDSEC_MANAGER_SERVICE}-bypass.middlewares=chain-external-bypass@file
      - traefik.http.routers.${CROWDSEC_MANAGER_SERVICE}-bypass.priority=2500
      - traefik.http.routers.${CROWDSEC_MANAGER_SERVICE}-bypass.rule=Host(`${CROWDSEC_MANAGER_EXTERNAL_URL}`) && Header(`${SPECIAL_HEADER_NAME}`, `${SPECIAL_HEADER_SECRET}`)
      - traefik.http.routers.${CROWDSEC_MANAGER_SERVICE}-bypass.service=${CROWDSEC_MANAGER_SERVICE}
      - traefik.http.routers.${CROWDSEC_MANAGER_SERVICE}-bypass.tls=true
      # Service port (must match the port the manager listens on INSIDE the container)
      - traefik.docker.network=smoonet
      - traefik.http.services.${CROWDSEC_MANAGER_SERVICE}.loadbalancer.server.url=${CROWDSEC_MANAGER_INTERNAL_URL}
      - com.smoochy.komodo.restore_stack=crowdsec
      - net.unraid.docker.icon=https://raw.githubusercontent.com/ibracorp/app-logos/main/crowdsec/crowdsec.png
      - net.unraid.docker.webui=${CROWDSEC_MANAGER_INTERNAL_URL}
    networks:
      - smoonet
    pids_limit: 2048
    ports:
      - "6062:8080/tcp"
    restart: unless-stopped
    volumes:
      - ./compose.yaml:/app/docker-compose.yml:ro
      - /mnt/user/appdata/crowdsec/manager/backups/:/app/backups:rw
      - /mnt/user/appdata/crowdsec/manager/config/:/app/config:rw
      - /mnt/user/appdata/crowdsec/manager/data/:/app/data:rw
      - /mnt/user/appdata/traefik/dynamic.yml:/etc/traefik/dynamic.yml:rw
      - /mnt/user/appdata/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
  crowdsec-firewall-bouncer:
    cap_add:
      - NET_ADMIN
      - NET_RAW
    container_name: crowdsec-firewall-bouncer
    depends_on:
      - crowdsec
    environment:
      - API_KEY=${CROWDSEC_FIREWALL_BOUNCER_API_KEY}
      - API_URL=http://crowdsec:8080
      - HOST_CONTAINERNAME=crowdsec-firewall-bouncer
      - HOST_HOSTNAME=homelab-host
      - HOST_OS=Unraid
      - TZ=Europe/Berlin
    image: ghcr.io/shgew/cs-firewall-bouncer-docker:v0.0.34-patch1@sha256:c33bae81fdade1e1c243946bedfcdb5b22a25c4fbd1ef166ce32935334d7575c
    labels:
      - com.smoochy.komodo.restore_stack=crowdsec
      - net.unraid.docker.icon=https://raw.githubusercontent.com/ibracorp/app-logos/main/crowdsec/crowdsec.png
    network_mode: host
    pids_limit: 2048
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /mnt/user/appdata/crowdsec/bouncers/:/config:rw
networks:
  smoonet:
    external: true
